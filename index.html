#lockBgGrad {
  position:absolute; inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,10,30,0.2) 0%,
    rgba(0,10,40,0.5) 40%,
    rgba(0,5,20,0.85) 100%
  );
}
#lockContent {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; width:100%;
}
.lock-badge {
  font-size:10px; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,0.5);
  text-transform:uppercase; margin-bottom:16px;
  border:1px solid rgba(255,255,255,0.2); border-radius:20px;
  padding:5px 14px; backdrop-filter:blur(4px);
  background:rgba(255,255,255,0.06);
}
.lock-year {
  font-size:42px; font-weight:800; color:#fff;
  letter-spacing:-1px; line-height:1;
  margin-bottom:4px;
}
.lock-year em { color:#60a5fa; font-style:normal; }
.lock-name {
  font-size:14px; color:rgba(255,255,255,0.65);
  font-weight:400; margin-bottom:36px; letter-spacing:0.5px;
}
.lock-dots {
  display:flex; gap:16px; margin-bottom:28px;
}
.lock-dot {
  width:12px; height:12px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.4);
  background:transparent; transition:all 0.15s;
}
.lock-dot.filled { background:#60a5fa; border-color:#60a5fa; box-shadow:0 0 8px #3b82f6; }
.lock-keypad {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; width:220px;
}
.lock-key {
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50%; width:64px; height:64px;
  font-size:22px; font-weight:600; color:#fff;
  cursor:pointer; transition:all 0.1s;
  font-family:'Noto Sans KR',sans-serif;
  backdrop-filter:blur(8px);
  line-height:1;
}
.lock-key:hover { background:rgba(255,255,255,0.18); }
.lock-key:active { background:rgba(96,165,250,0.35); border-color:#60a5fa; transform:scale(0.93); }
.lock-key.del { font-size:18px; }
.lock-key.empty { background:transparent; border:none; cursor:default; pointer-events:none; }
.lock-error {
  margin-top:18px; font-size:12px; color:#fca5a5;
  font-weight:600; opacity:0; transition:opacity 0.2s; letter-spacing:0.5px;
}
.lock-error.show { opacity:1; }
.lock-shake { animation:shake 0.35s; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}

:root {
  --bg: #f4f6fb;
  --s1: #ffffff;
  --s2: #f8f9fd;
  --s3: #eef1f8;
  --bd: #e2e6f0;
  --bd2: #ccd2e3;
  --blue: #2563eb;
  --blue-lt: #dbeafe;
  --green: #16a34a;
  --green-lt: #dcfce7;
  --orange: #ea580c;
  --orange-lt: #ffedd5;
  --purple: #7c3aed;
  --purple-lt: #ede9fe;
  --red: #dc2626;
  --red-lt: #fee2e2;
  --t1: #0f172a;
  --t2: #475569;
  --t3: #94a3b8;
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--t1); font-family:'Noto Sans KR',sans-serif; font-size:14px; }
.app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* HEADER */
.hdr { background:var(--s1); border-bottom:1px solid var(--bd); padding:10px 14px 8px; flex-shrink:0; box-shadow:var(--shadow); }
.hdr-title { font-size:16px; font-weight:700; color:var(--t1); }
.hdr-title em { color:var(--blue); font-style:normal; }
.hdr-sub { font-size:10px; color:var(--t3); margin-top:1px; }
.chips { display:flex; gap:6px; margin-top:8px; overflow-x:auto; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip { background:var(--s3); border:1px solid var(--bd); border-radius:20px; padding:3px 10px;
  display:flex; align-items:center; gap:4px; white-space:nowrap; flex-shrink:0; font-size:11px; color:var(--t2); }
.chip .n { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; }
.chip.bl .n { color:var(--blue); } .chip.or .n { color:var(--orange); }
.chip.gr .n { color:var(--green); } .chip.pu .n { color:var(--purple); }

/* CONTENT */
.content { flex:1; overflow:hidden; position:relative; }
.panel { position:absolute; inset:0; display:none; flex-direction:column; }
.panel.active { display:flex; }

/* WEEK TABS */

// ── UTILS ──
function getColor(type,univ){
  if(univ) return '#ea580c';
  if(type==='weekly') return '#2563eb';
  if(type==='biweekly') return '#7c3aed';
  return '#16a34a';
}
function haversine(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function midpoint(a,b){return{lat:(a.lat+b.lat)/2,lng:(a.lng+b.lng)/2};}

function calcQuota(upToDk){
  const cutIdx=DATE_ORDER.indexOf(upToDk);
  const done={};
  // 체크된 방문만 카운트 (방문기록 기반)
  DATE_ORDER.slice(0,cutIdx+1).forEach(dk=>{
    const checks=(visitRecords[dk]||{}).checks||{};
    const extras=(visitRecords[dk]||{}).extraVisits||[];
    // 정규 방문
    (SCH[dk]||{visits:[]}).visits.filter(v=>v.name).forEach(v=>{
      if(checks[v.name]) done[v.name]=(done[v.name]||0)+1;
    });
    // 추가 방문
    extras.forEach(function(name){
      if(checks[name]) done[name]=(done[name]||0)+1;
    });
  });
  const result={};
  Object.keys(QUOTA_TOTAL).forEach(n=>{result[n]={total:QUOTA_TOTAL[n],done:Math.min(done[n]||0,QUOTA_TOTAL[n])};});
  return result;
}

let leafMap=null, mapLayers=[];
function initMap(){
  if(leafMap) return;
  leafMap=L.map('mapModal',{zoomControl:false,attributionControl:false}).setView([37.48,126.89],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:17}).addTo(leafMap);
  L.control.zoom({position:'bottomright'}).addTo(leafMap);
  const hi=L.divIcon({html:'<div style="background:#fff;border:2px solid #2563eb;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#2563eb;font-weight:900;">H</div>',className:'',iconSize:[18,18],iconAnchor:[9,9]});
  L.marker([HOME.lat,HOME.lng],{icon:hi}).addTo(leafMap).bindTooltip('🏠 집');
}

function renderMap(dk){
  initMap();
  mapLayers.forEach(l=>leafMap.removeLayer(l)); mapLayers=[];
  const day=SCH[dk]; if(!day) return;
  const hvs=day.visits.filter(v=>v.name);
  if(!hvs.length) return;
  const stops=[HOME,...hvs.map(v=>H[v.name]).filter(Boolean)];
  const pts=stops.map(s=>[s.lat,s.lng]);
  const glow=L.polyline(pts,{color:'#2563eb',weight:10,opacity:0.1}).addTo(leafMap);
  const line=L.polyline(pts,{color:'#2563eb',weight:2.5,opacity:0.9,dashArray:'8 5'}).addTo(leafMap);
  mapLayers.push(glow,line);
  for(let i=0;i<stops.length-1;i++){
    const mid=midpoint(stops[i],stops[i+1]);
    const km=(haversine(stops[i],stops[i+1])*1.35).toFixed(1);
    const di=L.divIcon({html:`<div class="dist-label-map">${km}km</div>`,className:'',iconSize:[60,20],iconAnchor:[30,10]});
    mapLayers.push(L.marker([mid.lat,mid.lng],{icon:di,interactive:false}).addTo(leafMap));
  }
  hvs.forEach((v,i)=>{
    const h=H[v.name]; if(!h) return;
    const c=getColor(h.type,h.univ||v.univ);
    const short=v.name.replace('정형외과의원','정형').replace('재활의학과의원','재활').replace('마취통증의학과','통증').replace('의원','').replace('정형외과','정형');
    const icon=L.divIcon({
      html:`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <div style="background:${c};border:2px solid #fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.2);">${i+1}</div>
        <div style="background:rgba(255,255,255,0.95);border:1.5px solid ${c};border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;color:${c};white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.15);">${short}</div>
      </div>`,
      className:'',iconSize:[110,50],iconAnchor:[55,14]
    });
    mapLayers.push(L.marker([h.lat,h.lng],{icon}).addTo(leafMap).bindTooltip(`<b>${i+1}. ${v.name}</b><br>${v.time||''}`));
  });
  if(pts.length>1) leafMap.fitBounds(pts,{padding:[60,60]});
}

    const rec=visitRecords[dk]||{checks:{},memo:''};
    const allDone=hvs.every(v=>rec.checks[v.name]);
    const anyDone=hvs.some(v=>rec.checks[v.name]);

    if(weekMap[dk]){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;padding:14px 2px 6px;text-transform:uppercase;">${weekMap[dk]}</div>`;
    }

      <div class="rec-date-row">
        <div class="rec-date">${dk}(${day.dow}) ${day.dow}요일</div>

      </div>
      <div class="rec-hospitals">`;

    hvs.forEach(v=>{
      const checked=rec.checks[v.name]||false;
      html+=`<div class="rec-hosp-item" onclick="toggleCheck('${dk}','${v.name}')">
        <div>
          <div class="rec-hosp-name">${v.name}</div>
          <div class="rec-hosp-time">${v.time}</div>

    });

    // 추가 방문 병원

    extraVisits.forEach(function(name,i){
      const exChecked=(rec.checks||{})[name]||false;
      extraHtml+=`<div class="rec-hosp-item" style="background:var(--blue-lt);" onclick="toggleCheck('${dk}','${name}')">
        <div>
          <div class="rec-hosp-name" style="color:var(--blue);">${name} <span style="font-size:10px;color:var(--t3);">(추가)</span></div>

function addExtraVisitByName(dk, name){
  if(!name) return;
  if(!visitRecords[dk]) visitRecords[dk]={checks:{},memo:'',extraVisits:[]};
  if(!visitRecords[dk].extraVisits) visitRecords[dk].extraVisits=[];
  visitRecords[dk].extraVisits.push(name);
  visitRecords[dk].checks[name]=true;
  saveRecords();
  updateStats();
  renderRecordPanel();
}
function addExtraVisit(dk){
  const inp=document.getElementById('extraInput_'+dk);
  const name=(inp?.value||'').trim();
  if(!name) return;
  if(!visitRecords[dk]) visitRecords[dk]={checks:{},memo:'',extraVisits:[]};
  if(!visitRecords[dk].extraVisits) visitRecords[dk].extraVisits=[];
  visitRecords[dk].extraVisits.push(name);
  // 자동 체크
  visitRecords[dk].checks[name]=true;
  saveRecords();
  updateStats();
  renderRecordPanel();
}
function deleteExtraVisit(dk,idx){
  if(!visitRecords[dk]||!visitRecords[dk].extraVisits) return;
  const name=visitRecords[dk].extraVisits[idx];
  visitRecords[dk].extraVisits.splice(idx,1);
  if(visitRecords[dk].checks) delete visitRecords[dk].checks[name];
  saveRecords();
  updateStats();
  renderRecordPanel();
}
function toggleCheck(dk,name){
  if(!visitRecords[dk]) visitRecords[dk]={checks:{},memo:''};
  visitRecords[dk].checks[name]=!visitRecords[dk].checks[name];
  saveRecords();
  updateStats();
  renderRecordPanel();
}
function saveMemo(dk,val){
  if(!visitRecords[dk]) visitRecords[dk]={checks:{},memo:''};
  visitRecords[dk].memo=val;
  saveRecords();
}
function saveRecord(dk){

}

function showMissed(){
  const body=document.getElementById('missedBody');
  // Count visits per hospital across entire schedule
  const scheduled={};
  DATE_ORDER.forEach(dk=>{
    (SCH[dk]||{visits:[]}).visits.filter(v=>v.name).forEach(v=>{
      scheduled[v.name]=(scheduled[v.name]||[]);
      scheduled[v.name].push(dk);
    });
  });
  // Check which are not yet checked in records
  const missed=[];
  Object.keys(scheduled).forEach(name=>{
    scheduled[name].forEach(dk=>{
      const rec=visitRecords[dk]||{checks:{}};
      if(!rec.checks[name]) missed.push({name,dk,time:SCH[dk].visits.find(v=>v.name===name)?.time||''});
    });
  });

  if(!missed.length){
    body.innerHTML='<div style="text-align:center;padding:40px;color:var(--green);font-size:15px;font-weight:700;">🎉 미방문 병원 없음<br><span style="font-size:12px;color:var(--t3);font-weight:400;margin-top:8px;display:block;">모든 병원 방문 완료</span></div>';
  } else {
    // Group by date
    const byDate={};
    missed.forEach(m=>{ if(!byDate[m.dk]) byDate[m.dk]=[]; byDate[m.dk].push(m); });
    let html=`<div style="font-size:12px;color:var(--t3);margin-bottom:12px;">총 <b style="color:var(--orange)">${missed.length}건</b> 미방문</div>`;
    DATE_ORDER.forEach(dk=>{
      if(!byDate[dk]) return;
      const day=SCH[dk];
      html+=`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);">
        <div style="padding:8px 12px;background:var(--orange-lt);border-bottom:1px solid #fed7aa;font-size:12px;font-weight:700;color:var(--orange);">${dk}(${day.dow}) ${day.dow}요일</div>`;
      byDate[dk].forEach(m=>{
        const h=H[m.name];
        html+=`<div style="padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--t1);">${m.name}</div>
            <div style="font-size:11px;color:var(--t3);">${h?h.addr:''}</div>
          </div>

        </div>`;
      });
      html+='</div>';

    body.innerHTML=html;

      btn.style.cssText='background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:"Noto Sans KR",sans-serif;flex-shrink:0;';

        btn.disabled=true;
      };
      card.appendChild(btn);

  }

  body.innerHTML='';
  body.appendChild(panel);
  document.getElementById('missedModalWrap').classList.add('open');
}

  document.querySelectorAll('.act-section').forEach(sec=>{

// ── AUTOCOMPLETE ──
const ALL_HOSPS = Object.keys(QUOTA_TOTAL).sort(function(a,b){return a.localeCompare(b,'ko');});

function buildAcInput(containerId, confirmFn){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  wrap.innerHTML = '';
  
  const acWrap = document.createElement('div');
  acWrap.className = 'ac-wrap';
  
  const inp = document.createElement('input');
  inp.className = 'ac-input';
  inp.placeholder = '병원명 검색 또는 직접 입력...';
  inp.autocomplete = 'off';
  
  const dropdown = document.createElement('div');
  dropdown.className = 'ac-dropdown';
  dropdown.style.display = 'none';
  
  function showDropdown(val){
    const q = val.trim();
    const filtered = q ? ALL_HOSPS.filter(function(h){ return h.includes(q); }) : ALL_HOSPS.slice(0,10);
    dropdown.innerHTML = '';
    filtered.forEach(function(name){
      const item = document.createElement('div');
      item.className = 'ac-item';
      item.textContent = name;
      item.onmousedown = function(e){ e.preventDefault(); inp.value = name; dropdown.style.display='none'; };
      dropdown.appendChild(item);
    });
    // 기타
    const other = document.createElement('div');
    other.className = 'ac-item other';
    other.textContent = q ? '기타: "'+q+'" 직접 입력' : '기타 (직접 입력)';
    other.onmousedown = function(e){ e.preventDefault(); dropdown.style.display='none'; };
    dropdown.appendChild(other);
    dropdown.style.display = filtered.length || q ? 'block' : 'none';
  }
  
  inp.addEventListener('input', function(){ showDropdown(inp.value); });
  inp.addEventListener('focus', function(){ showDropdown(inp.value); });
  inp.addEventListener('blur', function(){ setTimeout(function(){ dropdown.style.display='none'; }, 150); });
  inp.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); confirmFn(inp.value.trim()); inp.value=''; dropdown.style.display='none'; }
  });
  
  acWrap.appendChild(inp);
  acWrap.appendChild(dropdown);
  wrap.appendChild(acWrap);
  
  const btn = document.createElement('button');
  btn.textContent = '추가';
  btn.style.cssText = 'padding:8px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:"Noto Sans KR",sans-serif;flex-shrink:0;';
  btn.onclick = function(){ confirmFn(inp.value.trim()); inp.value=''; dropdown.style.display='none'; };
  wrap.appendChild(btn);
  wrap.style.cssText = 'display:flex;gap:6px;align-items:flex-start;margin-top:8px;margin-bottom:6px;';
}

function renderActivityPanel(filterTag){
  actFilterTag=(filterTag===undefined?actFilterTag:filterTag)||null;
  const panel=document.getElementById('panel-activity');
  const ACTS=['판촉','사전설명','DTM','제품설명회'];
  const tagColors={'판촉':'#2563eb','사전설명':'#7c3aed','DTM':'#ea580c','제품설명회':'#16a34a'};
  const tagBg={'판촉':'#dbeafe','사전설명':'#ede9fe','DTM':'#ffedd5','제품설명회':'#dcfce7'};

  // 병원별 수집
  const hospMap={};
  DATE_ORDER.forEach(function(dk){
    const day=SCH[dk]; if(!day) return;
    const allVisits=day.visits.filter(function(v){return v.name;}).slice();
    if(day.buffer){
      const buf=(visitRecords['buffer_'+dk]||{}).hospitals||[];
      buf.forEach(function(n){ allVisits.push({name:n,time:''}); });
    }
    allVisits.forEach(function(v){
      if(!hospMap[v.name]) hospMap[v.name]={name:v.name,entries:[]};
      const actData=visitRecords[dk+'__'+v.name]||{};
      hospMap[v.name].entries.push({dk:dk,dow:day.dow,time:v.time||'',tags:actData.tags||[],memos:actData.memos||{}});
    });
  });

  const hospList=Object.values(hospMap).sort(function(a,b){return a.name.localeCompare(b.name,'ko');});

  // 활동 요약 카운트
  const totals={'판촉':0,'사전설명':0,'DTM':0,'제품설명회':0};
  hospList.forEach(function(h){
    const hospTags=new Set();
    h.entries.forEach(function(e){ e.tags.forEach(function(t){ hospTags.add(t); }); });
    hospTags.forEach(function(t){ if(totals[t]!==undefined) totals[t]++; });
  });

  const filtered=actFilterTag
    ? hospList.filter(function(h){ return h.entries.some(function(e){return e.tags.includes(actFilterTag);}); })
    : hospList;

  // 전체를 DOM으로 구성
  panel.innerHTML='';
  const wrap=document.createElement('div');
  wrap.style.cssText='padding:12px 12px 80px;';

  // 요약 타이틀
  const t1=document.createElement('div');
  t1.style.cssText='font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;margin-bottom:8px;';
  t1.textContent='활동 요약 (버튼 눌러 필터)';
  wrap.appendChild(t1);

  // 요약 그리드
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;';
  ACTS.forEach(function(a){
    const sel=actFilterTag===a;
    const box=document.createElement('div');
    box.style.cssText='background:'+(sel?tagColors[a]:tagBg[a])+';border-radius:10px;padding:12px;text-align:center;cursor:pointer;border:2px solid '+(sel?tagColors[a]:'transparent')+';';
    box.innerHTML='<div style="font-family:\'DM Mono\',monospace;font-size:24px;font-weight:700;color:'+(sel?'#fff':tagColors[a])+';">'+totals[a]+'</div>'
      +'<div style="font-size:12px;font-weight:600;color:'+(sel?'#fff':tagColors[a])+';margin-top:2px;">'+a+'</div>';
    box.onclick=function(){ renderActivityPanel(sel?'':a); };
    grid.appendChild(box);
  });
  wrap.appendChild(grid);

  // 필터 배너
  if(actFilterTag){
    const banner=document.createElement('div');
    banner.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:'+tagBg[actFilterTag]+';border-radius:8px;';
    banner.innerHTML='<span style="font-size:12px;font-weight:700;color:'+tagColors[actFilterTag]+';">'+actFilterTag+' 활동 '+filtered.length+'곳</span>';
    const clr=document.createElement('button');
    clr.textContent='👆 전체보기';
    clr.style.cssText='margin-left:auto;background:none;border:none;color:'+tagColors[actFilterTag]+';font-size:12px;font-weight:700;cursor:pointer;';
    clr.onclick=function(){ renderActivityPanel(''); };
    banner.appendChild(clr);
    wrap.appendChild(banner);
  }

  // 목록 헤더
  const listHeader=document.createElement('div');
  listHeader.style.cssText='font-size:11px;font-weight:700;color:var(--t3);margin-bottom:8px;';
  listHeader.textContent='병원 목록 ('+filtered.length+'곳) — 가나다순';
  wrap.appendChild(listHeader);

  if(filtered.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:30px;color:var(--t3);font-size:13px;';
    empty.textContent='해당 활동 기록이 없습니다';
    wrap.appendChild(empty);
  } else {
    filtered.forEach(function(h){
      wrap.appendChild(makeHospCard(h, tagColors, tagBg));
    });
  }

  panel.appendChild(wrap);
}

// ── STATS ──
function updateStats(){
  let done=0, total=61;
  Object.values(visitRecords).forEach(rec=>{
    Object.values(rec.checks||{}).forEach(checked=>{ if(checked) done++; });
  });
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-remain').textContent=Math.max(0,total-done);
}

// ── DONE LIST MODAL ──
function showChipList(type){
  const wrap=document.getElementById('doneModalWrap');
  const body=document.getElementById('doneModalBody');
  const titleEl=wrap.querySelector('.map-modal-title');

  // 병원별 체크 집계
  const hospChecked={};
  DATE_ORDER.forEach(function(dk){
    const day=SCH[dk]; if(!day||day.buffer) return;
    const rec=visitRecords[dk]||{};
    const checks=rec.checks||{};
    day.visits.filter(function(v){return v.name;}).forEach(function(v){
      if(!hospChecked[v.name]) hospChecked[v.name]={done:0,total:QUOTA_TOTAL[v.name]||1,dates:[]};
      if(checks[v.name]){
        hospChecked[v.name].done++;
        hospChecked[v.name].dates.push(dk+'('+day.dow+')');
      }
    });
    (rec.extraVisits||[]).forEach(function(name){
      if(!hospChecked[name]) hospChecked[name]={done:0,total:QUOTA_TOTAL[name]||1,dates:[]};
      if(checks[name]){
        hospChecked[name].done++;
        hospChecked[name].dates.push(dk+'('+day.dow+') 추가');
      }
    });
  });

  // 전체 30개 병원 목록 (스케줄 기준 고유)
  const allHosps=Object.keys(QUOTA_TOTAL).sort(function(a,b){return a.localeCompare(b,'ko');});

  let list=[];
  const tagColor={'bl':'#2563eb','or':'#ea580c','gr':'#16a34a','pu':'#7c3aed'};
  const tagBg={'bl':'#dbeafe','or':'#ffedd5','gr':'#dcfce7','pu':'#ede9fe'};

  if(type==='all'){
    titleEl.textContent='🏥 담당병원 (30곳)';
    list=allHosps.map(function(name){
      const info=hospChecked[name]||{done:0,total:QUOTA_TOTAL[name]};
      return {name,done:info.done,total:info.total,color:'#2563eb',bg:'#dbeafe'};
    });
  } else if(type==='total'){
    titleEl.textContent='📅 월총방문 (61건)';
    // 날짜×병원 전체
    const entries=[];
    DATE_ORDER.forEach(function(dk){
      const day=SCH[dk]; if(!day||day.buffer) return;
      day.visits.filter(function(v){return v.name;}).forEach(function(v){
        entries.push({name:v.name,dk:dk,dow:day.dow,time:v.time||''});
      });
    });
    // 주차별 그룹
    const weekMap={'3/2':'1주차','3/9':'2주차','3/16':'3주차','3/23':'4주차'};
    const panel=document.createElement('div');
    const summary=document.createElement('div');
    summary.style.cssText='margin-bottom:14px;background:#ffedd5;border-radius:10px;padding:12px;text-align:center;';
    summary.innerHTML='<span style="font-size:24px;font-weight:700;color:#ea580c;">61</span><span style="font-size:13px;color:#ea580c;margin-left:6px;">건 예정</span>';
    panel.appendChild(summary);
    let lastWk='';
    entries.forEach(function(e){
      const day=SCH[e.dk];
      const wk=day?day.week:'';
      if(wk!==lastWk){
        lastWk=wk;
        const h=document.createElement('div');
        h.style.cssText='font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;padding:10px 2px 6px;';
        h.textContent=wk;
        panel.appendChild(h);
      }
      const checks=(visitRecords[e.dk]||{}).checks||{};
      const isDone=checks[e.name];
      const card=document.createElement('div');
      card.style.cssText='background:var(--s1);border:1px solid var(--bd);border-left:4px solid '+(isDone?'var(--green)':'var(--bd2)')+';border-radius:10px;margin-bottom:5px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);';
      card.innerHTML='<div>'
        +'<div style="font-size:13px;font-weight:700;color:var(--t1);">'+e.name+'</div>'
        +'<div style="font-size:10px;color:var(--t3);margin-top:1px;">'+e.dk+'('+e.dow+') '+e.time+'</div>'
        +'</div>'
        +'<span style="font-size:12px;color:'+(isDone?'var(--green)':'var(--t3)')+';">'+(isDone?'✅':'○')+'</span>';
      panel.appendChild(card);
    });
    body.innerHTML='';
    body.appendChild(panel);
    wrap.classList.add('open');
    return;
  } else if(type==='remain'){
    titleEl.textContent='⏳ 잔여 방문';
    list=allHosps.map(function(name){
      const info=hospChecked[name]||{done:0,total:QUOTA_TOTAL[name]};
      return {name,done:info.done,total:info.total,color:'#7c3aed',bg:'#ede9fe'};
    }).filter(function(e){return e.done<e.total;});
  }

  // 공통 카드 렌더
  const panel=document.createElement('div');
  const summary=document.createElement('div');
  const col=type==='all'?'#2563eb':type==='remain'?'#7c3aed':'#16a34a';
  const bg=type==='all'?'#dbeafe':type==='remain'?'#ede9fe':'#dcfce7';
  summary.style.cssText='margin-bottom:14px;background:'+bg+';border-radius:10px;padding:12px;text-align:center;';
  summary.innerHTML='<span style="font-size:24px;font-weight:700;color:'+col+';">'+list.length+'</span>'
    +'<span style="font-size:13px;color:'+col+';margin-left:6px;">곳</span>';
  panel.appendChild(summary);

  list.forEach(function(e){
    const pct=Math.round(e.done/e.total*100);
    const card=document.createElement('div');
    card.style.cssText='background:var(--s1);border:1px solid var(--bd);border-left:4px solid '+(e.done>=e.total?'var(--green)':'var(--bd2)')+';border-radius:10px;margin-bottom:6px;padding:11px 14px;box-shadow:var(--shadow);';
    card.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(e.total>1?'6':'0')+'px;">'
      +'<div style="font-size:13px;font-weight:700;color:var(--t1);">'+e.name+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:'+col+';">'+e.done+'/'+e.total+'회</div>'
      +'</div>'
      +(e.total>1?'<div style="height:6px;background:var(--bd2);border-radius:4px;overflow:hidden;">'
        +'<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:4px;"></div>'
        +'</div>':'');
    panel.appendChild(card);
  });
  body.innerHTML='';
  body.appendChild(panel);
  wrap.classList.add('open');
}

function showDoneList(){
  const wrap=document.getElementById('doneModalWrap');
  const body=document.getElementById('doneModalBody');

  // 병원별 체크된 횟수 집계 (추가방문 포함)
  const hospChecked={};
  DATE_ORDER.forEach(function(dk){
    const day=SCH[dk]; if(!day||day.buffer) return;
    const rec=visitRecords[dk]||{};
    const checks=rec.checks||{};
    // 정규 방문
    day.visits.filter(function(v){return v.name;}).forEach(function(v){
      if(checks[v.name]) hospChecked[v.name]=(hospChecked[v.name]||0)+1;
    });
    // 추가 방문
    (rec.extraVisits||[]).forEach(function(name){
      if(checks[name]) hospChecked[name]=(hospChecked[name]||0)+1;
    });
  });

  // 할당량 전부 채운 병원만
  const completed=[];
  const inProgress=[];
  Object.keys(QUOTA_TOTAL).forEach(function(name){
    const total=QUOTA_TOTAL[name];
    const done=hospChecked[name]||0;
    if(done>=total) completed.push({name:name,done:done,total:total});
    else if(done>0) inProgress.push({name:name,done:done,total:total});
  });
  completed.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
  inProgress.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});

  const panel=document.createElement('div');

  // 요약
  const summary=document.createElement('div');
  summary.style.cssText='margin-bottom:14px;background:var(--green-lt);border-radius:10px;padding:14px;text-align:center;';
  summary.innerHTML='<span style="font-size:26px;font-weight:700;color:var(--green);">'+completed.length+'</span>'
    +'<span style="font-size:13px;color:var(--green);margin-left:6px;">/ 30개 병원 할당량 완료</span>';
  panel.appendChild(summary);

  // 완료 병원 목록
  if(completed.length){
    const h1=document.createElement('div');
    h1.style.cssText='font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;padding:4px 2px 8px;';
    h1.textContent='✅ 할당량 완료 ('+completed.length+'곳)';
    panel.appendChild(h1);
    completed.forEach(function(e){
      const card=document.createElement('div');
      card.style.cssText='background:var(--s1);border:1px solid var(--bd);border-left:4px solid var(--green);border-radius:10px;margin-bottom:6px;padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);';
      card.innerHTML='<div style="width:22px;height:22px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="color:#fff;font-size:12px;">✓</span></div>'
        +'<div style="flex:1;">'
        +'<div style="font-size:13px;font-weight:700;color:var(--t1);">'+e.name+'</div>'
        +'<div style="font-size:11px;color:var(--t3);margin-top:2px;">'+e.done+'/'+e.total+'회 완료</div>'
        +'</div>';
      panel.appendChild(card);
    });
  } else {
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:30px;color:var(--t3);font-size:13px;';
    empty.textContent='아직 할당량을 완료한 병원이 없습니다';
    panel.appendChild(empty);
  }

  // 진행 중 병원 목록
  if(inProgress.length){
    const h2=document.createElement('div');
    h2.style.cssText='font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;padding:14px 2px 8px;';
    h2.textContent='🔄 진행 중 ('+inProgress.length+'곳)';
    panel.appendChild(h2);
    inProgress.forEach(function(e){
      const pct=Math.round(e.done/e.total*100);
      const card=document.createElement('div');
      card.style.cssText='background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;padding:11px 14px;box-shadow:var(--shadow);';
      card.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'
        +'<div style="font-size:13px;font-weight:700;color:var(--t1);">'+e.name+'</div>'
        +'<div style="font-size:11px;font-weight:700;color:var(--blue);">'+e.done+'/'+e.total+'회</div>'
        +'</div>'
        +'<div style="height:6px;background:var(--bd2);border-radius:4px;overflow:hidden;">'
        +'<div style="height:100%;width:'+pct+'%;background:var(--blue);border-radius:4px;transition:width 0.3s;"></div>'
        +'</div>';
      panel.appendChild(card);
    });
  }

  body.innerHTML='';
  body.appendChild(panel);
  wrap.classList.add('open');
}
function closeDoneModal(){
  document.getElementById('doneModalWrap').classList.remove('open');
}

      <button class="lock-key empty"></button>
      <button class="lock-key" onclick="lockInput('0')">0</button>
      <button class="lock-key del" onclick="lockDel()">⌫</button>
    </div>
    <div class="lock-error" id="lockError">비밀번호가 틀렸습니다</div>
  </div>
</div></div>
<script>
const LOCK_PW = '0330';
let lockVal = '';
function lockInput(n){
  if(lockVal.length >= 4) return;
  lockVal += n;
  document.getElementById('ld'+(lockVal.length-1)).classList.add('filled');
  if(lockVal.length === 4){
    setTimeout(function(){
      if(lockVal === LOCK_PW){
        document.getElementById('lockScreen').style.transition='opacity 0.4s';
        document.getElementById('lockScreen').style.opacity='0';
        setTimeout(function(){ document.getElementById('lockScreen').style.display='none'; }, 400);
      } else {
        const dots = document.getElementById('lockDots');
        dots.classList.add('lock-shake');
        document.getElementById('lockError').classList.add('show');
        setTimeout(function(){
          dots.classList.remove('lock-shake');
          lockVal='';
          for(let i=0;i<4;i++) document.getElementById('ld'+i).classList.remove('filled');
          document.getElementById('lockError').classList.remove('show');
        }, 800);
      }
    }, 100);
  }
}
function lockDel(){
  if(!lockVal.length) return;
  lockVal = lockVal.slice(0,-1);
  for(let i=0;i<4;i++) document.getElementById('ld'+i).classList.remove('filled');
  for(let i=0;i<lockVal.length;i++) document.getElementById('ld'+i).classList.add('filled');
}
</script>
