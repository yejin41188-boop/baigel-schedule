<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>바이겔 방문 스케줄 3월</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fb;
  --s1: #ffffff;
  --s2: #f8f9fd;
  --s3: #eef1f8;
  --bd: #e2e6f0;
  --bd2: #ccd2e3;
  --blue: #2563eb;
  --blue-lt: #dbeafe;
  --green: #16a34a;
  --green-lt: #dcfce7;
  --orange: #ea580c;
  --orange-lt: #ffedd5;
  --purple: #7c3aed;
  --purple-lt: #ede9fe;
  --red: #dc2626;
  --red-lt: #fee2e2;
  --t1: #0f172a;
  --t2: #475569;
  --t3: #94a3b8;
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--t1); font-family:'Noto Sans KR',sans-serif; font-size:14px; }
.app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* HEADER */
.hdr { background:var(--s1); border-bottom:1px solid var(--bd); padding:10px 14px 8px; flex-shrink:0; box-shadow:var(--shadow); }
.hdr-title { font-size:16px; font-weight:700; color:var(--t1); }
.hdr-title em { color:var(--blue); font-style:normal; }
.hdr-sub { font-size:10px; color:var(--t3); margin-top:1px; }
.chips { display:flex; gap:6px; margin-top:8px; overflow-x:auto; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip { background:var(--s3); border:1px solid var(--bd); border-radius:20px; padding:3px 10px;
  display:flex; align-items:center; gap:4px; white-space:nowrap; flex-shrink:0; font-size:11px; color:var(--t2); }
.chip .n { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; }
.chip.bl .n { color:var(--blue); } .chip.or .n { color:var(--orange); }
.chip.gr .n { color:var(--green); } .chip.pu .n { color:var(--purple); }

/* CONTENT */
.content { flex:1; overflow:hidden; position:relative; }
.panel { position:absolute; inset:0; display:none; flex-direction:column; }
.panel.active { display:flex; }

/* WEEK TABS */
.week-tabs { display:flex; background:var(--s1); border-bottom:1px solid var(--bd); flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
.week-tabs::-webkit-scrollbar { display:none; }
.wtab { background:none; border:none; color:var(--t3); padding:9px 16px; font-size:12px; font-weight:600;
  white-space:nowrap; cursor:pointer; border-bottom:2px solid transparent;
  font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; flex-shrink:0; }
.wtab.active { color:var(--blue); border-bottom-color:var(--blue); }

/* DATE STRIP */
.date-strip { display:flex; gap:6px; padding:10px 12px; background:var(--s2);
  border-bottom:1px solid var(--bd); overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
.date-strip::-webkit-scrollbar { display:none; }
.dcard { background:var(--s1); border:1.5px solid var(--bd); border-radius:10px;
  padding:7px 10px; cursor:pointer; flex-shrink:0; text-align:center; min-width:52px;
  transition:all 0.15s; box-shadow:var(--shadow); }
.dcard:active { transform:scale(0.93); }
.dcard.active { background:var(--blue); border-color:var(--blue); }
.dcard.buffer { opacity:0.5; }
.dcard .dn { font-family:'DM Mono',monospace; font-size:18px; font-weight:600; color:var(--t2); line-height:1; }
.dcard.active .dn { color:#fff; }
.dcard .dd { font-size:10px; color:var(--t3); margin-top:2px; }
.dcard.active .dd { color:rgba(255,255,255,0.8); }
.dcard .dc { font-size:9px; color:var(--t3); }
.dcard.active .dc { color:rgba(255,255,255,0.7); }
.ddots { display:flex; gap:2px; justify-content:center; margin-top:3px; }
.dot { width:6px; height:6px; border-radius:50%; }
.dot.weekly { background:var(--blue); }
.dot.biweekly { background:var(--purple); }
.dot.monthly { background:var(--green); }
.dot.univ { background:var(--orange); }
.dcard.active .dot { background:rgba(255,255,255,0.7) !important; }

/* SCHEDULE SCROLL */
.sch-scroll { flex:1; overflow-y:auto; padding:12px 12px 80px; background:var(--bg); }
.sch-scroll::-webkit-scrollbar { width:3px; }
.sch-scroll::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:2px; }

/* DAY TITLE */
.day-title-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px; gap:8px;
}
.day-title-left { display:flex; align-items:center; gap:10px; }
.day-main { font-size:18px; font-weight:700; color:var(--t1); }
.day-sub { font-size:11px; color:var(--t3); margin-top:2px; }
.map-btn {
  display:flex; align-items:center; gap:5px;
  background:var(--blue); color:#fff; border:none;
  border-radius:20px; padding:6px 12px; font-size:12px; font-weight:600;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
  font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 2px 8px rgba(37,99,235,0.3);
  transition:all 0.15s;
}
.map-btn:active { transform:scale(0.95); background:#1d4ed8; }
.map-btn svg { width:14px; height:14px; }
.miss-btn {
  display:flex; align-items:center; gap:5px;
  background:var(--orange-lt); color:var(--orange); border:1px solid #fed7aa;
  border-radius:20px; padding:6px 12px; font-size:12px; font-weight:600;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
  font-family:'Noto Sans KR',sans-serif; transition:all 0.15s;
}
.miss-btn:active { transform:scale(0.95); }

.day-count-badge {
  background:var(--blue-lt); color:var(--blue);
  border-radius:8px; padding:4px 10px;
  font-family:'DM Mono',monospace; font-size:13px; font-weight:600;
  white-space:nowrap;
}

/* VISIT CARD */
.vcard {
  background:var(--s1); border:1px solid var(--bd); border-radius:12px;
  margin-bottom:8px; overflow:hidden; box-shadow:var(--shadow);
  border-left:4px solid var(--bd2);
}
.vcard.weekly { border-left-color:var(--blue); }
.vcard.biweekly { border-left-color:var(--purple); }
.vcard.monthly { border-left-color:var(--green); }
.vcard.univ { border-left-color:var(--orange); }
.vcard.alert { border-left-color:var(--red); background:var(--red-lt); }

.vcard-inner { padding:12px 14px; }
.vcard-seq { font-size:10px; color:var(--t3); margin-bottom:4px; font-weight:500; }
.vcard-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.vcard-name { font-size:15px; font-weight:700; color:var(--t1); line-height:1.3; }
.vcard-time { font-family:'DM Mono',monospace; font-size:12px; color:var(--blue);
  white-space:nowrap; flex-shrink:0; font-weight:600; background:var(--blue-lt);
  padding:2px 7px; border-radius:6px; }

.vcard-badges { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.badge { font-size:9px; padding:2px 8px; border-radius:5px; font-weight:700; }
.badge-univ { background:var(--orange-lt); color:var(--orange); }
.badge-weekly { background:var(--blue-lt); color:var(--blue); }
.badge-biweekly { background:var(--purple-lt); color:var(--purple); }
.badge-monthly { background:var(--green-lt); color:var(--green); }
.badge-done { background:var(--green-lt); color:var(--green); }

.vcard-addr { font-size:11px; color:var(--t3); margin-top:4px; }
.vcard-note { font-size:11px; color:var(--orange); margin-top:3px; font-weight:500; }

/* DISTANCE ROW */
.dist-row {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px;
  background:var(--s3); border-top:1px solid var(--bd);
  font-size:11px; color:var(--t2);
}
.dist-row span { color:var(--t3); }
.dist-pill {
  background:var(--blue-lt); color:var(--blue);
  border-radius:5px; padding:1px 7px;
  font-family:'DM Mono',monospace; font-size:11px; font-weight:600;
}

/* QUOTA ROW */
.qrow { display:flex; align-items:center; gap:8px; margin-top:8px; padding-top:8px; border-top:1px solid var(--bd); }
.qlabel { font-size:10px; color:var(--t3); font-weight:500; }
.qbar { flex:1; height:5px; background:var(--s3); border-radius:3px; overflow:hidden; }
.qfill { height:100%; border-radius:3px; transition:width 0.4s; }
.qfill.done { background:var(--green); }
.qfill.progress { background:var(--blue); }
.qval { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; color:var(--t2); }

/* MOVE ARROW */
.move-arrow {
  display:flex; align-items:center; gap:6px;
  padding:5px 12px; color:var(--t3); font-size:11px;
}
.move-arrow::before { content:'↓'; color:var(--bd2); font-size:14px; }

/* ALERT CARD */
.alert-text { font-size:12px; color:var(--red); line-height:1.6; font-weight:500; }
.alert-ico { margin-right:4px; }

/* SUMMARY BOX */
.summary-box {
  background:var(--s1); border:1px solid var(--bd); border-radius:12px;
  padding:12px 14px; margin-bottom:10px; box-shadow:var(--shadow);
}
.sb-row { display:flex; gap:0; }
.sb-item { flex:1; text-align:center; padding:4px 0; }
.sb-item:not(:last-child) { border-right:1px solid var(--bd); }
.sb-num { font-family:'DM Mono',monospace; font-size:20px; font-weight:600; color:var(--t1); }
.sb-label { font-size:10px; color:var(--t3); margin-top:2px; }

/* ── RECORD PANEL ── */
#panel-record { overflow-y:auto; padding:12px 12px 80px; background:var(--bg); display:none; flex-direction:column; }
#panel-record.active { display:flex; }

.rec-section-title {
  font-size:12px; font-weight:700; color:var(--t3);
  letter-spacing:1px; text-transform:uppercase;
  padding:0 2px; margin-bottom:8px; margin-top:14px;
}
.rec-section-title:first-child { margin-top:0; }

.rec-card {
  background:var(--s1); border:1px solid var(--bd); border-radius:12px;
  padding:14px; margin-bottom:8px; box-shadow:var(--shadow);
}
.rec-date-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.rec-date { font-size:14px; font-weight:700; color:var(--t1); }
.rec-status { font-size:11px; font-weight:600; padding:2px 10px; border-radius:10px; }
.rec-status.done { background:var(--green-lt); color:var(--green); }
.rec-status.partial { background:#fef9c3; color:#a16207; }
.rec-status.missing { background:var(--s3); color:var(--t3); }

.rec-hospitals { display:flex; flex-direction:column; gap:6px; }
.rec-hosp-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; background:var(--s3); border-radius:8px;
  cursor:pointer; transition:background 0.15s;
}
.rec-hosp-item:active { background:var(--bd); }
.rec-hosp-name { font-size:13px; font-weight:500; color:var(--t1); }
.rec-hosp-time { font-size:11px; color:var(--t3); }
.rec-check {
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--bd2); display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s;
}
.rec-check.checked { background:var(--green); border-color:var(--green); }
.rec-check.checked::after { content:'✓'; color:#fff; font-size:12px; font-weight:700; }

.rec-memo-area {
  width:100%; margin-top:10px; padding:8px 10px;
  background:var(--s3); border:1px solid var(--bd); border-radius:8px;
  font-size:12px; color:var(--t1); resize:none; min-height:60px;
  font-family:'Noto Sans KR',sans-serif;
  outline:none;
}
.rec-save-btn {
  width:100%; margin-top:10px; padding:10px;
  background:var(--blue); color:#fff; border:none; border-radius:8px;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 2px 8px rgba(37,99,235,0.25);
}
.rec-save-btn:active { background:#1d4ed8; transform:scale(0.98); }

/* ── MAP MODAL ── */
.map-modal {
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,0.5); display:none;
  flex-direction:column; align-items:stretch;
}
.map-modal.open { display:flex; }
.map-modal-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
}
.map-modal-header {
  background:var(--s1); padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--bd); flex-shrink:0;
}
.map-modal-title { font-size:15px; font-weight:700; }
.map-back-btn {
  display:flex; align-items:center; gap:5px;
  background:var(--blue-lt); color:var(--blue); border:none;
  border-radius:20px; padding:6px 14px;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}
.map-back-btn:active { background:var(--bd); }
#mapModal { flex:1; }
.map-legend-bar {
  background:var(--s1); border-top:1px solid var(--bd);
  padding:8px 12px; display:flex; gap:10px; flex-wrap:wrap;
  flex-shrink:0;
}
.ml-item { display:flex; align-items:center; gap:4px; }
.ml-dot { width:9px; height:9px; border-radius:50%; }
.ml-text { font-size:10px; color:var(--t2); }

/* TAB BAR */
.tabbar { display:flex; background:var(--s1); border-top:1px solid var(--bd); flex-shrink:0; box-shadow:0 -2px 8px rgba(0,0,0,0.05); }
.tbtn { flex:1; background:none; border:none; color:var(--t3); padding:9px 4px 7px;
  cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;
  font-family:'Noto Sans KR',sans-serif; transition:color 0.15s; }
.tbtn.active { color:var(--blue); }
.tbtn svg { width:20px; height:20px; }
.tbtn span { font-size:10px; font-weight:600; }

/* NOTIFICATION TOAST */
.toast {
  position:fixed; top:0; left:0; right:0; z-index:2000;
  background:var(--blue); color:#fff;
  padding:14px 16px; display:none;
  flex-direction:column; gap:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { display:flex; }
.toast-title { font-size:14px; font-weight:700; }
.toast-sub { font-size:12px; opacity:0.85; }
.toast-actions { display:flex; gap:8px; }
.toast-btn {
  padding:6px 14px; border-radius:6px; border:none;
  font-size:12px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}
.toast-btn.primary { background:#fff; color:var(--blue); }
.toast-btn.secondary { background:rgba(255,255,255,0.2); color:#fff; }

/* Leaflet override */
.leaflet-container { background:#f4f6fb !important; }
.leaflet-tile { filter:brightness(0.95) saturate(0.85); }
.dist-label-map {
  background:rgba(255,255,255,0.95); border:1.5px solid #2563eb;
  border-radius:5px; padding:2px 7px;
  font-family:'DM Mono',monospace; font-size:11px; font-weight:700; color:#2563eb;
  white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">바이겔 스케줄 <em>2026·3월</em></div>
  <div class="hdr-sub">집: 인천 서구 한들로 73 · 월 11:00 / 화~금 10:00 출발</div>
  <div class="chips">
    <div class="chip bl"><span class="n">30</span>담당병원</div>
    <div class="chip or"><span class="n">61</span>월총방문</div>
    <div class="chip gr"><span class="n" id="stat-done">0</span>완료</div>
    <div class="chip pu"><span class="n" id="stat-remain">61</span>잔여</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- SCHEDULE PANEL -->
  <div class="panel active" id="panel-sch">
    <div class="week-tabs" id="weekTabs"></div>
    <div class="date-strip" id="dateStrip"></div>
    <div class="sch-scroll" id="schScroll">
      <div style="color:var(--t3);text-align:center;padding:40px;font-size:13px;">위에서 날짜를 선택하세요</div>
    </div>
  </div>

  <!-- RECORD PANEL -->
  <div class="panel" id="panel-record"></div>

</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tbtn active" onclick="switchTab('sch',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span>일정</span>
  </button>
  <button class="tbtn" onclick="switchTab('record',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      <polyline points="9 12 11 14 15 10"/>
    </svg>
    <span>방문기록</span>
  </button>
</div>

</div>

<!-- MAP MODAL -->
<div class="map-modal" id="mapModalWrap">
  <div class="map-modal-inner">
    <div class="map-modal-header">
      <button class="map-back-btn" onclick="closeMap()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        일정으로
      </button>
      <div class="map-modal-title" id="mapModalTitle">동선 지도</div>
    </div>
    <div id="mapModal"></div>
    <div class="map-legend-bar">
      <div class="ml-item"><div class="ml-dot" style="background:#2563eb"></div><span class="ml-text">주1회</span></div>
      <div class="ml-item"><div class="ml-dot" style="background:#7c3aed"></div><span class="ml-text">격주</span></div>
      <div class="ml-item"><div class="ml-dot" style="background:#16a34a"></div><span class="ml-text">월1회</span></div>
      <div class="ml-item"><div class="ml-dot" style="background:#ea580c"></div><span class="ml-text">대학병원</span></div>
    </div>
  </div>
</div>

<!-- MISSED MODAL -->
<div class="map-modal" id="missedModalWrap">
  <div class="map-modal-inner" style="background:var(--bg);overflow-y:auto;">
    <div class="map-modal-header">
      <button class="map-back-btn" onclick="closeMissed()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        일정으로
      </button>
      <div class="map-modal-title">미방문 병원</div>
    </div>
    <div id="missedBody" style="padding:12px 12px 40px;"></div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle">📋 방문 기록을 저장하세요</div>
  <div class="toast-sub" id="toastSub">오늘 방문한 병원을 기록해 주세요</div>
  <div class="toast-actions">
    <button class="toast-btn primary" onclick="goToRecord()">기록하기</button>
    <button class="toast-btn secondary" onclick="dismissToast()">나중에</button>
  </div>
</div>

<script>
// ── DATA ──
const HOME={lat:37.5498,lng:126.6823,name:'집'};
const H={
  '새움병원':{lat:37.4533,lng:126.9006,addr:'서울 금천구',type:'weekly'},
  '중앙대병원(서울)':{lat:37.5042,lng:126.9613,addr:'서울 동작구',type:'weekly',univ:true},
  '가톨릭성빈센트병원':{lat:37.2636,lng:127.0286,addr:'경기 수원 팔달',type:'weekly',univ:true},

// ── UTILS ──
function getColor(type,univ){
  if(univ) return '#ea580c';
  if(type==='weekly') return '#2563eb';
  if(type==='biweekly') return '#7c3aed';
  return '#16a34a';
}
function haversine(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function midpoint(a,b){return{lat:(a.lat+b.lat)/2,lng:(a.lng+b.lng)/2};}

function calcQuota(upToDk){
  const cutIdx=DATE_ORDER.indexOf(upToDk);
  const done={};
  DATE_ORDER.slice(0,cutIdx+1).forEach(dk=>{
    (SCH[dk]||{visits:[]}).visits.filter(v=>v.name).forEach(v=>{done[v.name]=(done[v.name]||0)+1;});
  });
  const result={};
  Object.keys(QUOTA_TOTAL).forEach(n=>{result[n]={total:QUOTA_TOTAL[n],done:Math.min(done[n]||0,QUOTA_TOTAL[n])};});
  return result;
}

// ── MAP ──
let leafMap=null, mapLayers=[];
function initMap(){
  if(leafMap) return;
  leafMap=L.map('mapModal',{zoomControl:false,attributionControl:false}).setView([37.48,126.89],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:17}).addTo(leafMap);
  L.control.zoom({position:'bottomright'}).addTo(leafMap);
  const hi=L.divIcon({html:'<div style="background:#fff;border:2px solid #2563eb;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#2563eb;font-weight:900;">H</div>',className:'',iconSize:[18,18],iconAnchor:[9,9]});
  L.marker([HOME.lat,HOME.lng],{icon:hi}).addTo(leafMap).bindTooltip('🏠 집');
}

function renderMap(dk){
  initMap();
  mapLayers.forEach(l=>leafMap.removeLayer(l)); mapLayers=[];
  const day=SCH[dk]; if(!day) return;
  const hvs=day.visits.filter(v=>v.name);
  if(!hvs.length) return;
  const stops=[HOME,...hvs.map(v=>H[v.name]).filter(Boolean)];
  const pts=stops.map(s=>[s.lat,s.lng]);
  const glow=L.polyline(pts,{color:'#2563eb',weight:10,opacity:0.1}).addTo(leafMap);
  const line=L.polyline(pts,{color:'#2563eb',weight:2.5,opacity:0.9,dashArray:'8 5'}).addTo(leafMap);
  mapLayers.push(glow,line);
  for(let i=0;i<stops.length-1;i++){
    const mid=midpoint(stops[i],stops[i+1]);
    const km=(haversine(stops[i],stops[i+1])*1.35).toFixed(1);
    const di=L.divIcon({html:`<div class="dist-label-map">${km}km</div>`,className:'',iconSize:[60,20],iconAnchor:[30,10]});
    mapLayers.push(L.marker([mid.lat,mid.lng],{icon:di,interactive:false}).addTo(leafMap));
  }
  hvs.forEach((v,i)=>{
    const h=H[v.name]; if(!h) return;
    const c=getColor(h.type,h.univ||v.univ);
    const short=v.name.replace('정형외과의원','정형').replace('재활의학과의원','재활').replace('마취통증의학과','통증').replace('의원','').replace('정형외과','정형');
    const icon=L.divIcon({
      html:`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <div style="background:${c};border:2px solid #fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.2);">${i+1}</div>
        <div style="background:rgba(255,255,255,0.95);border:1.5px solid ${c};border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;color:${c};white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.15);">${short}</div>
      </div>`,
      className:'',iconSize:[110,50],iconAnchor:[55,14]
    });
    mapLayers.push(L.marker([h.lat,h.lng],{icon}).addTo(leafMap).bindTooltip(`<b>${i+1}. ${v.name}</b><br>${v.time||''}`));
  });
  if(pts.length>1) leafMap.fitBounds(pts,{padding:[60,60]});
}

let currentMapDk=null;
function openMap(dk){
  currentMapDk=dk;
  const day=SCH[dk];
  document.getElementById('mapModalTitle').textContent=`${day.label}(${day.dow}) 동선`;
  document.getElementById('mapModalWrap').classList.add('open');
  setTimeout(()=>{
    if(leafMap) leafMap.invalidateSize();
    renderMap(dk);
  },80);
}
function closeMap(){
  document.getElementById('mapModalWrap').classList.remove('open');
}

// ── WEEK TABS ──
let activeWeek=1;
function renderWeekTabs(){
  document.getElementById('weekTabs').innerHTML=WEEKS.map((w,i)=>
    `<button class="wtab${i===activeWeek?' active':''}" onclick="selectWeek(${i},this)">${w.label}</button>`
  ).join('');
}
function selectWeek(idx,btn){
  activeWeek=idx;
  document.querySelectorAll('.wtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDateStrip(idx);
  selectDate(WEEKS[idx].keys[0]);
}

// ── DATE STRIP ──
let selectedDate='3/9';
function renderDateStrip(wIdx){
  const strip=document.getElementById('dateStrip');
  strip.innerHTML=WEEKS[wIdx].keys.map(dk=>{
    const day=SCH[dk];
    const hvs=day.visits.filter(v=>v.name);
    const dots=hvs.map(v=>{
      const h=H[v.name];
      return `<div class="dot ${v.univ||h?.univ?'univ':(h?.type||v.type||'monthly')}"></div>`;
    }).join('');
    return `<div class="dcard${day.buffer?' buffer':''}${dk===selectedDate?' active':''}" data-dk="${dk}" onclick="selectDate('${dk}')">
      <div class="dn">${dk.split('/')[1]}</div>
      <div class="dd">${day.dow}</div>
      <div class="dc">${day.buffer?'버퍼':hvs.length+'곳'}</div>
      <div class="ddots">${dots}</div>
    </div>`;
  }).join('');
}

// ── SCHEDULE ──
function renderSchedule(dk){
  const day=SCH[dk]; if(!day) return;
  const hvs=day.visits.filter(v=>v.name);
  const quota=calcQuota(dk);
  const typeMap={weekly:'주1회',biweekly:'격주',monthly:'월1회'};

  // Summary
  let html=`<div class="summary-box">
    <div class="sb-row">
      <div class="sb-item"><div class="sb-num">${hvs.length}</div><div class="sb-label">방문 병원</div></div>
      <div class="sb-item"><div class="sb-num">${hvs.filter(v=>v.univ||H[v.name]?.univ).length}</div><div class="sb-label">대학병원</div></div>
      <div class="sb-item"><div class="sb-num">${day.hours}</div><div class="sb-label">출발</div></div>
    </div>
  </div>`;

  // Day title row with MAP BUTTON
  html=`<div class="day-title-row">
    <div class="day-title-left">
      <div>
        <div class="day-main">${dk}(${day.dow}) ${day.dow}요일</div>
        <div class="day-sub">${day.week} · ${day.hours}</div>
      </div>
      <button class="map-btn" onclick="openMap('${dk}')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        </svg>
        지도
      </button>
      <button class="miss-btn" onclick="showMissed()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        미방문
      </button>
    </div>
    <div class="day-count-badge">${hvs.length}곳</div>
  </div>` + html;

  let order=0;
  day.visits.forEach(v=>{
    if(v.type==='alert'){
      html+=`<div class="vcard alert"><div class="vcard-inner"><div class="alert-text"><span class="alert-ico">⚠</span>${v.text}</div></div></div>`;
      return;
    }
    order++;
    const h=H[v.name];
    const isUniv=v.univ||h?.univ;
    const typeClass=isUniv?'univ':v.type;
    const q=quota[v.name];
    const pct=q?Math.round(q.done/q.total*100):0;
    const isDone=q&&q.done>=q.total;

    html+=`<div class="vcard ${typeClass}">
      <div class="vcard-inner">
        <div class="vcard-seq">${order}번째 방문</div>
        <div class="vcard-top">
          <div class="vcard-name">${v.name}</div>
          <div class="vcard-time">${v.time}</div>
        </div>
        <div class="vcard-badges">
          ${isUniv?'<span class="badge badge-univ">🏥 대학</span>':''}
          <span class="badge badge-${v.type}">${typeMap[v.type]||''}</span>
          ${isDone?'<span class="badge badge-done">완료 ✓</span>':''}
        </div>
        <div class="vcard-addr">${h?h.addr:''}</div>
        ${v.note?`<div class="vcard-note">⏱ ${v.note}</div>`:''}
        ${q?`<div class="qrow">
          <span class="qlabel">할당</span>
          <div class="qbar"><div class="qfill ${isDone?'done':'progress'}" style="width:${pct}%"></div></div>
          <span class="qval">${q.done}/${q.total}</span>
        </div>`:''}
      </div>
      ${v.dist?`<div class="dist-row">
        <span>이동</span><div class="dist-pill">${v.dist}</div>
        <span>·</span><div class="dist-pill">${v.move}</div>
        <span style="margin-left:auto;font-size:10px;color:var(--t3)">주차 포함</span>
      </div>`:''}
    </div>`;
  });

  document.getElementById('schScroll').innerHTML=html;
  document.getElementById('schScroll').scrollTop=0;
}

function selectDate(dk){
  selectedDate=dk;
  document.querySelectorAll('.dcard').forEach(c=>c.classList.toggle('active',c.dataset.dk===dk));
  renderSchedule(dk);
}

// ── RECORD PANEL ──
let visitRecords={};
function loadRecords(){
  try{ const s=localStorage.getItem('visitRecords'); if(s) visitRecords=JSON.parse(s); }catch(e){}
}
function saveRecords(){ try{ localStorage.setItem('visitRecords',JSON.stringify(visitRecords)); }catch(e){} }

function renderRecordPanel(){
  const panel=document.getElementById('panel-record');
  // 모든 날짜 표시 (3/2~3/31), 버퍼 제외
  const allDates=DATE_ORDER.filter(dk=>!SCH[dk]?.buffer);

  // Week group headers
  const weekMap={'3/2':'1주차','3/9':'2주차','3/16':'3주차','3/23':'4주차'};
  let html='';
  let lastWeek='';

  allDates.forEach(dk=>{
    const day=SCH[dk]; if(!day) return;
    const hvs=day.visits.filter(v=>v.name); if(!hvs.length) return;
    const rec=visitRecords[dk]||{checks:{},memo:''};
    const allDone=hvs.every(v=>rec.checks[v.name]);
    const anyDone=hvs.some(v=>rec.checks[v.name]);

    if(weekMap[dk]){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;padding:14px 2px 6px;text-transform:uppercase;">${weekMap[dk]}</div>`;
    }

    html+=`<div class="rec-card">
      <div class="rec-date-row">
        <div class="rec-date">${dk}(${day.dow}) ${day.dow}요일</div>
        <div class="rec-status ${allDone?'done':anyDone?'partial':'missing'}">${allDone?'완료':anyDone?'일부':'미기록'}</div>
      </div>
      <div class="rec-hospitals">`;

    hvs.forEach(v=>{
      const checked=rec.checks[v.name]||false;
      html+=`<div class="rec-hosp-item" onclick="toggleCheck('${dk}','${v.name}')">
        <div>
          <div class="rec-hosp-name">${v.name}</div>
          <div class="rec-hosp-time">${v.time}</div>
        </div>
        <div class="rec-check${checked?' checked':''}"></div>
      </div>`;
    });

    html+=`</div>
      <textarea class="rec-memo-area" placeholder="메모 (특이사항, 담당자 반응 등...)"
        onchange="saveMemo('${dk}',this.value)">${rec.memo||''}</textarea>
      <button class="rec-save-btn" onclick="saveRecord('${dk}')">💾 저장</button>
    </div>`;
  });

  if(!html) html='<div style="color:var(--t3);text-align:center;padding:40px;font-size:13px;">기록 없음</div>';
  panel.innerHTML=`<div style="padding:12px 12px 80px;">${html}</div>`;
}

function toggleCheck(dk,name){
  if(!visitRecords[dk]) visitRecords[dk]={checks:{},memo:''};
  visitRecords[dk].checks[name]=!visitRecords[dk].checks[name];
  saveRecords();
  updateStats();
  renderRecordPanel();
}
function saveMemo(dk,val){
  if(!visitRecords[dk]) visitRecords[dk]={checks:{},memo:''};
  visitRecords[dk].memo=val;
  saveRecords();
}
function saveRecord(dk){
  saveRecords();
  const btn=document.querySelector(`button[onclick="saveRecord('${dk}')"]`);
  if(btn){ btn.textContent='✅ 저장완료'; btn.style.background='#16a34a'; setTimeout(()=>{btn.textContent='💾 저장';btn.style.background='';},2000); }
}

// ── MISSED HOSPITALS ──
function showMissed(){
  const body=document.getElementById('missedBody');
  // Count visits per hospital across entire schedule
  const scheduled={};
  DATE_ORDER.forEach(dk=>{
    (SCH[dk]||{visits:[]}).visits.filter(v=>v.name).forEach(v=>{
      scheduled[v.name]=(scheduled[v.name]||[]);
      scheduled[v.name].push(dk);
    });
  });
  // Check which are not yet checked in records
  const missed=[];
  Object.keys(scheduled).forEach(name=>{
    scheduled[name].forEach(dk=>{
      const rec=visitRecords[dk]||{checks:{}};
      if(!rec.checks[name]) missed.push({name,dk,time:SCH[dk].visits.find(v=>v.name===name)?.time||''});
    });
  });

  if(!missed.length){
    body.innerHTML='<div style="text-align:center;padding:40px;color:var(--green);font-size:15px;font-weight:700;">🎉 미방문 병원 없음<br><span style="font-size:12px;color:var(--t3);font-weight:400;margin-top:8px;display:block;">모든 병원 방문 완료</span></div>';
  } else {
    // Group by date
    const byDate={};
    missed.forEach(m=>{ if(!byDate[m.dk]) byDate[m.dk]=[]; byDate[m.dk].push(m); });
    let html=`<div style="font-size:12px;color:var(--t3);margin-bottom:12px;">총 <b style="color:var(--orange)">${missed.length}건</b> 미방문</div>`;
    DATE_ORDER.forEach(dk=>{
      if(!byDate[dk]) return;
      const day=SCH[dk];
      html+=`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);">
        <div style="padding:8px 12px;background:var(--orange-lt);border-bottom:1px solid #fed7aa;font-size:12px;font-weight:700;color:var(--orange);">${dk}(${day.dow}) ${day.dow}요일</div>`;
      byDate[dk].forEach(m=>{
        const h=H[m.name];
        html+=`<div style="padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--t1);">${m.name}</div>
            <div style="font-size:11px;color:var(--t3);">${h?h.addr:''}</div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);background:var(--blue-lt);padding:2px 8px;border-radius:5px;">${m.time}</div>
        </div>`;
      });
      html+='</div>';
    });
    body.innerHTML=html;
  }
  document.getElementById('missedModalWrap').classList.add('open');
}
function closeMissed(){ document.getElementById('missedModalWrap').classList.remove('open'); }

// ── TOAST NOTIFICATION ──
function showToast(){
  const toast=document.getElementById('toast');
  const today=getTodayKey();
  if(!today) return;
  const day=SCH[today]; if(!day) return;
  document.getElementById('toastTitle').textContent=`📋 ${today}(${day.dow}) 방문 기록`;
  document.getElementById('toastSub').textContent=`오늘 방문한 ${day.visits.filter(v=>v.name).length}곳을 기록해 주세요`;
  toast.classList.add('show');
}
function dismissToast(){ document.getElementById('toast').classList.remove('show'); }
function goToRecord(){
  dismissToast();
  switchTab('record', document.querySelector('.tbtn:nth-child(2)'));
}
function getTodayKey(){
  const now=new Date();
  const m=now.getMonth()+1, d=now.getDate();
  return `${m}/${d}`;
}

// Auto show toast after 3 seconds if today has visits
setTimeout(()=>{
  const today=getTodayKey();
  if(SCH[today] && SCH[today].visits.filter(v=>v.name).length>0){
    showToast();
  }
}, 3000);

// ── TABS ──
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='record') renderRecordPanel();
}

// ── STATS ──
function updateStats(){
  // 완료: 방문기록에서 체크된 병원만 카운트
  let done=0, total=61;
  Object.values(visitRecords).forEach(rec=>{
    Object.values(rec.checks||{}).forEach(checked=>{ if(checked) done++; });
  });
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-remain').textContent=total-done;
}

// ── INIT ──
loadRecords();
renderWeekTabs();
updateStats();
renderDateStrip(1);
selectDate('3/9');
</script>
</body>
</html>
